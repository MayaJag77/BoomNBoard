<!DOCTYPE html>

{% load staticfiles %}

<link rel="stylesheet" href="{% static 'styling/style.css' %}">
<script defer src="{% static 'javascript/javascript.js' %}"></script>

    <head>
        <title>BoomNBoard</title>
    </head>

    <body>
        <div id="NavDiv">
        <nav class="navbar">
            <img src="{% static 'images/Media.jpg' %}" alt="Logo" class="Logo" />
            <ul class="links">
                <li class="LinkItem"><a href="home/">Home</a></li>
                <li class="LinkItem"><a href="/home/categories/">Categories</a></li>
                <li class="LinkItem"><a href="/home/myaccount/">My Account</a></li>
                <li class="LinkItem"><a href="/home/help/">Help</a></li>
                <li class="LinkItem"><a href="/home/login/">Login</a></li>
                <li class="LinkItem"><a href="/home/signup/">Sign Up</a></li>
            </ul>
        </nav>
    </div>
    <br>
    <br>
        <div id="AboutTextDiv">
            <strong>{{ aboutmessage }}</strong>
            <br>
            <strong>{{ aboutmessagecontinued }}</strong>
            <br>
            <br>
            <strong>{{colourkeymessage}}</strong>
        </div>

        <div id="TrendingSoundsDiv" style="background-color: lightgray; height:25em;">
           <u><h2 style="text-align: left;">Trending Sounds</h2></u> 
        <div style="display:flex;">
           <div class="ButtonClass">
                <p>#1</p>
                <button> 
                    <img src="{% static 'images/MemeButton-removebg-preview.png' %}" alt="MemeButton" class="SoundButton" height="300em" width="300em"/>
                </button>
                 <br>
           </div>
           <div class="ButtonClass">
                <p>#2</p>
                <button> 
                 <img src="{% static 'images/RingButton-removebg-preview.png' %}" alt="RingButton" class="SoundButton"  height="300em" width="300em"/>
                </button>
           </div>
           <div class="ButtonClass">
                <p>#3</p>
                <button> 
                 <img src="{% static 'images/MusicButton-removebg-preview.png' %}" alt="MusicButton" class="SoundButton"  height="300em" width="300em"/>
                 </button>  
           </div>
           <div class="ButtonClass">
                <p>#4</p>
                <button> 
                 <img src="{% static 'images/MusicButton-removebg-preview.png' %}" alt="MusicButton" class="SoundButton"  height="300em" width="300em"/>
                </button>
           </div>
           <div class="ButtonClass">
                <p>#5</p>
                <button> 
                <img src="{% static 'images/MemeButton-removebg-preview.png' %}" alt="MemeButton" class="SoundButton"  height="300em" width="300em"/>
                </button>
           </div>
           </div>
           <div class="TrendingSoundNamesClass">
                {% for sound in TrendingSounds %}
                    <div class="SoundNameClass">
                         <h3>{{ sound.name }}</h3>
                    </div>
                {% endfor %}
            </div>
           <div style="display:flex;"> 
                <div class="DownloadLikeDiv">
                <button id="DownloadButton1" onclick="downloadSong(this)" data-name="{{ TrendingSounds.0.soundFile }}"><img src="{% static 'images/DownloadButton.jpg' %}" alt="Download" id="DownloadButton1" height="150em" width="70em"></button>
                <button id="LikeButton1" onclick="changeImage(this)" ><img src="{% static 'images/LikeButtonWhite.jpg' %}" alt="Like" height="150em" width="70em" id="LikeImage1"></button>
                </div>
                <div class="DownloadLikeDiv">
                <button id="DownloadButton2" onclick="downloadSong(this)" data-name="{{ TrendingSounds.1.soundFile }}"><img src="{% static 'images/DownloadButton.jpg' %}" alt="Download" id="DownloadButton2" height="150em" width="70em"></button>
                <button id="LikeButton2" onclick="changeImage(this)" ><img src="{% static 'images/LikeButtonWhite.jpg' %}" alt="Like"  height="150em" width="70em" id="LikeImage2"></button>
                </div>
                <div class="DownloadLikeDiv">
                <button id="DownloadButton3"onclick="downloadSong(this)" data-name="{{ TrendingSounds.2.soundFile }}"><img src="{% static 'images/DownloadButton.jpg' %}" alt="Download" id="DownloadButton3" height="150em" width="70em"></button>
                <button id="LikeButton3" onclick="changeImage(this)" ><img src="{% static 'images/LikeButtonWhite.jpg' %}" alt="Like"  height="150em" width="70em" id="LikeImage3"></button>
                </div>
                <div class="DownloadLikeDiv">
                <button id="DownloadButton4" onclick="downloadSong(this)" data-name="{{ TrendingSounds.3.soundFile }}"><img src="{% static 'images/DownloadButton.jpg' %}" alt="Download" id="DownloadButton4" height="150em" width="70em"></button>
                <button id="LikeButton4" onclick="changeImage(this)" ><img src="{% static 'images/LikeButtonWhite.jpg' %}" alt="Like"  height="150em" width="70em" id="LikeImage4"></button>
                </div>
                <div class="DownloadLikeDiv">
                <button id="DownloadButton5" onclick="downloadSong(this)" data-name="{{ TrendingSounds.4.soundFile }}"><img src="{% static 'images/DownloadButton.jpg' %}" alt="Download" id="DownloadButton5" height="150em" width="70em"></button>
                <button id="LikeButton5" onclick="changeImage(this)" > <img src="{% static 'images/LikeButtonWhite.jpg' %}" alt="Like"  height="150em" width="70em" id="LikeImage5"></button>
                </div>
           </div>
           <b><h1 style="text-align: center;">BoomNBoard</h1></b>      
        </div>

         <script>
        const RedHeart = "{% static 'images/LikeButtonRed.jpg' %}";
        const WhiteHeart = "{% static 'images/LikeButtonWhite.jpg' %}";
    </script>

    </body>
</html>
